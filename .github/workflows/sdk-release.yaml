name: Python/Kotlin/Java/Rust Release
on:
  # https://docs.github.com/en/developers/webhooks-and-events/webhook-events-and-payloads#release
  # The Bump Version workflow will make a Github release if it isn't a prerelease version
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  generate-cdylibs:
    uses: IronCoreLabs/workflows/.github/workflows/rust-artifact.yaml@rust-artifact-v0
    with:
      os_matrix: '["ubuntu-24.04", "ubuntu-24.04-arm", "macos-15-intel", "macos-14"]'
      build_profile: "release"
    secrets: inherit

  kotlin-release:
    needs: generate-cdylibs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/kotlin/src/main/resources/
      - name: Rename directories
        run: |
          mv ubuntu-24.04- linux-x86-64
          mv ubuntu-24.04-arm- linux-arm
          mv macos-15-intel- darwin-x86-64
          mv macos-14- darwin-aarch64
        working-directory: kotlin/src/main/resources/
      - name: Decrypt GPG key and gradle.properties
        uses: IronCoreLabs/ironhide-actions/decrypt@v3
        with:
          keys: ${{ secrets.IRONHIDE_KEYS }}
          input: .github/9FA43559.asc.iron .github/gradle.properties.iron
      - name: Move gradle properties and GPG key
        run: mv .github/gradle.properties kotlin/gradle.properties
      - name: Import GPG key
        run: gpg --batch --import .github/9FA43559.asc
      - name: Export GPG signing key
        run: gpg --export-secret-keys > /tmp/9FA43559.asc
      - name: Generate Kotlin files
        run: cargo run --bin uniffi-bindgen generate resources/linux-x86-64/libironcore_alloy.so --language kotlin --out-dir kotlin
        working-directory: kotlin/src/main
      - name: Publish
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
        working-directory: kotlin
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}

  java-release:
    needs: generate-cdylibs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/java/src/main/resources/
      - name: Rename directories
        run: |
          mv ubuntu-24.04- linux-x86-64
          mv ubuntu-24.04-arm- linux-arm
          mv macos-15-intel- darwin-x86-64
          mv macos-14- darwin-aarch64
        working-directory: java/src/main/resources/
      - name: Decrypt GPG key and gradle.properties
        uses: IronCoreLabs/ironhide-actions/decrypt@v3
        with:
          keys: ${{ secrets.IRONHIDE_KEYS }}
          input: .github/9FA43559.asc.iron .github/gradle.properties.iron
      - name: Move gradle properties and GPG key
        run: mv .github/gradle.properties java/gradle.properties
      - name: Import GPG key
        run: gpg --batch --import .github/9FA43559.asc
      - name: Export GPG signing key
        run: gpg --export-secret-keys > /tmp/9FA43559.asc
      - name: Generate Java files
        run: cargo run --bin uniffi-bindgen-java generate resources/linux-x86-64/libironcore_alloy.so --out-dir java
        working-directory: java/src/main
      - name: Publish
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
        working-directory: java
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}

  python-release:
    needs: generate-cdylibs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/python/ironcore-alloy
      - name: Rename directories
        run: |
          mv ubuntu-24.04- linux-x86-64
          mv ubuntu-24.04-arm- linux-arm
          mv macos-15-intel- darwin-x86-64
          mv macos-14- darwin-aarch64
        working-directory: python/ironcore-alloy
      - name: Generate Python files
        run: cargo run --bin uniffi-bindgen generate ../linux-x86-64/libironcore_alloy.so --language python --out-dir .
        working-directory: python/ironcore-alloy/ironcore_alloy
      - name: Install hatch
        run: pipx install hatch
      - name: Make wheels
        run: |
          archs="darwin-aarch64 darwin-x86-64 linux-arm linux-x86-64"
          for arch in $archs; do
            mv ../$arch/* ./
            CDYLIB_PLATFORM=$arch hatch build -t wheel
            rm libironcore_alloy.*
          done
        working-directory: python/ironcore-alloy/ironcore_alloy
      - name: Release to PyPi
        run: hatch publish --repo main --user __token__ --auth "${{ secrets.PYPI_TOKEN }}"
        working-directory: python/ironcore-alloy/ironcore_alloy

  rust-release:
    uses: IronCoreLabs/workflows/.github/workflows/rust-release.yaml@rust-release-v1
    secrets: inherit

  build-docs:
    needs: generate-cdylibs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ubuntu-24.04-
          path: ${{ github.workspace }}/python/ironcore-alloy/ironcore_alloy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: github
      - name: Generate Python files
        run: cargo run --bin uniffi-bindgen generate libironcore_alloy.* --language python --out-dir . --no-format
        working-directory: python/ironcore-alloy/ironcore_alloy
      - name: Install hatch
        run: pipx install hatch
      - name: Build docs
        run: hatch run docs:build
        working-directory: python/ironcore-alloy
      - name: Upload docs HTML
        uses: actions/upload-artifact@v4
        with:
          name: docs-html-${{ github.sha }}
          path: python/ironcore-alloy/site/
      - name: Deploy docs to ReadTheDocs
        run: |
          TAG=${{ github.event.release.tag_name || github.ref_name }}
          RTD_API="https://app.readthedocs.org/api/v3/projects/ironcore-alloy"
          AUTH="Authorization: Token ${{ secrets.RTD_API_TOKEN }}"

          # Sync versions so RTD discovers the tag and updates stable
          curl -sf -X POST -H "$AUTH" "$RTD_API/sync-versions/"
          # Wait for tag version to appear
          for i in $(seq 1 10); do
            curl -sf -H "$AUTH" "$RTD_API/versions/$TAG/" > /dev/null 2>&1 && break
            sleep 5
          done

          # Activate the tag version
          curl -sf -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"active": true, "hidden": false}' \
            "$RTD_API/versions/$TAG/"

          # Build the tag version
          BUILD_URL=$(curl -sf -X POST -H "$AUTH" \
            "$RTD_API/versions/$TAG/builds/" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['urls']['build'])")

          # Poll build status until finished
          for i in $(seq 1 60); do
            STATE=$(curl -sf -H "$AUTH" "$BUILD_URL" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['state']['code'])")
            case "$STATE" in
              finished) echo "RTD build succeeded"; break ;;
              cancelled|failed) echo "RTD build $STATE"; exit 1 ;;
            esac
            sleep 10
          done
          if [ "$STATE" != "finished" ]; then
            echo "RTD build timed out (state: $STATE)"
            exit 1
          fi

  mark-github-release:
    if: github.event.release != null
    needs: [kotlin-release, python-release, java-release, rust-release, build-docs]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Mark GitHub release as not prerelease
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: gh release edit --tag "${{ github.event.release.tag_name }}" --prerelease=false "${{ github.event.release.name }}"
