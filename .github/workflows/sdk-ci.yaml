name: Python/Kotlin/Java CI
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-cdylibs:
    uses: IronCoreLabs/workflows/.github/workflows/rust-artifact.yaml@rust-artifact-v0
    with:
      # This should stay in sync with the `runs-on` from the other jobs in this file
      os_matrix: '["ubuntu-24.04", "ubuntu-24.04-arm", "macos-15-intel", "macos-14"]'
      build_profile: "release"
    secrets: inherit

  kotlin-test:
    needs: generate-cdylibs
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        # This should stay in sync with the `os_matrix` above
        runs-on: ["ubuntu-24.04", "ubuntu-24.04-arm", "macos-15-intel", "macos-14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - uses: actions/download-artifact@v8
        with:
          name: ${{ join(matrix.runs-on) }}-
          path: ${{ github.workspace }}/kotlin/src/main/resources/
      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: github
      - name: Generate Kotlin files
        run: cargo run --bin uniffi-bindgen generate resources/libironcore_alloy.* --language kotlin --out-dir kotlin --no-format
        working-directory: kotlin/src/main
      - name: Run Kotlin tests
        run: ./gradlew test
        working-directory: kotlin

  java-test:
    needs: generate-cdylibs
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        # This should stay in sync with the `os_matrix` above
        runs-on: ["ubuntu-24.04", "ubuntu-24.04-arm", "macos-15-intel", "macos-14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - uses: actions/download-artifact@v8
        with:
          name: ${{ join(matrix.runs-on) }}-
          path: ${{ github.workspace }}/java/src/main/resources/
      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: github
      - name: Generate Java files
        run: cargo run --bin uniffi-bindgen-java generate resources/libironcore_alloy.* --out-dir java
        working-directory: java/src/main
      - name: Run Java tests
        run: ./gradlew test
        working-directory: java

  python-test:
    needs: generate-cdylibs
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        # This should stay in sync with the `os_matrix` above and the `runs-on` from the other jobs in this file
        runs-on: ["ubuntu-24.04", "ubuntu-24.04-arm", "macos-15-intel", "macos-14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ${{ join(matrix.runs-on) }}-
          path: ${{ github.workspace }}/python/ironcore-alloy/ironcore_alloy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: github
      - name: Generate Python files
        run: cargo run --bin uniffi-bindgen generate libironcore_alloy.* --language python --out-dir . --no-format
        working-directory: python/ironcore-alloy/ironcore_alloy
      - name: Install hatch
        if: matrix.runs-on != 'ubuntu-24.04-arm' && matrix.runs-on != 'macos-14'
        run: pipx install hatch
      - name: Install hatch (ARM)
        if: matrix.runs-on == 'ubuntu-24.04-arm' || matrix.runs-on == 'macos-14'
        # The arm machines have a permissions error if we don't use sudo
        run: sudo pipx install hatch
      - name: Run Python tests
        run: hatch test --all -- -s
        working-directory: python/ironcore-alloy
      - name: Upload generated Python bindings
        if: matrix.runs-on == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: python-bindings
          path: python/ironcore-alloy/ironcore_alloy/ironcore_alloy.py

  build-docs:
    needs: python-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: python-bindings
          path: python/ironcore-alloy/ironcore_alloy/
      - name: Install hatch
        run: pipx install hatch
      - name: Build docs
        run: hatch run docs:build
        working-directory: python/ironcore-alloy
      - name: Upload docs HTML
        uses: actions/upload-artifact@v4
        with:
          name: docs-html-${{ github.event.pull_request.head.sha || github.sha }}
          path: python/ironcore-alloy/site/
      - name: Deploy docs to ReadTheDocs
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=${{ github.head_ref }}
          RTD_API="https://app.readthedocs.org/api/v3/projects/ironcore-alloy"
          AUTH="Authorization: Token ${{ secrets.RTD_API_TOKEN }}"

          # Sync versions so RTD discovers the branch
          curl -sf -X POST -H "$AUTH" "$RTD_API/sync-versions/"
          # Wait for version to appear
          for i in $(seq 1 10); do
            curl -sf -H "$AUTH" "$RTD_API/versions/$BRANCH/" > /dev/null 2>&1 && break
            sleep 5
          done

          # Activate the version as hidden
          curl -sf -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"active": true, "hidden": true}' \
            "$RTD_API/versions/$BRANCH/"

          # Trigger build via v3 API and get the build's API URL
          BUILD_API=$(curl -sf -X POST -H "$AUTH" \
            "$RTD_API/versions/$BRANCH/builds/" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['build']['_links']['_self'])")

          # Poll build status until finished
          for i in $(seq 1 60); do
            STATE=$(curl -sf -H "$AUTH" "$BUILD_API" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['state']['code'])")
            case "$STATE" in
              finished) echo "RTD build succeeded"; break ;;
              cancelled|failed) echo "RTD build $STATE"; exit 1 ;;
            esac
            sleep 10
          done
          if [ "$STATE" != "finished" ]; then
            echo "RTD build timed out (state: $STATE)"
            exit 1
          fi

          # Comment docs preview link on PR (only once)
          URL="https://ironcore-alloy.readthedocs.io/en/$BRANCH/"
          if ! gh pr view ${{ github.event.pull_request.number }} --json comments -q '.comments[].body' | grep -qF "$URL"; then
            gh pr comment ${{ github.event.pull_request.number }} --body "Docs preview: $URL"
          fi
