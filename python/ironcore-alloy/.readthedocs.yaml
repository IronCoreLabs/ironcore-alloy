# Read the Docs configuration file for MkDocs projects
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# Docs are built by SDK CI (sdk-ci.yaml) and uploaded as a GitHub Actions artifact.
# This config downloads the pre-built HTML and copies it to the RTD output directory.
# See RELEASING.md for required RTD and GitHub secrets setup.
version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  commands:
    # Find the CI workflow run for this commit and download the pre-built docs
    - |
      REPO="IronCoreLabs/ironcore-alloy"
      COMMIT="$READTHEDOCS_GIT_COMMIT_HASH"
      # Find the workflow run for this commit
      RUN_ID=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/actions/runs?head_sha=$COMMIT&status=completed" \
        | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['id']) if runs else sys.exit(1)")
      # Find the docs-html artifact in that run
      ARTIFACT_URL=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/artifacts?name=docs-html" \
        | python3 -c "import sys,json; a=json.load(sys.stdin)['artifacts']; print(a[0]['archive_download_url']) if a else sys.exit(1)")
      # Download and extract to RTD output
      curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" "$ARTIFACT_URL" -o /tmp/docs.zip
      mkdir -p "$READTHEDOCS_OUTPUT/html"
      unzip -o /tmp/docs.zip -d "$READTHEDOCS_OUTPUT/html/"
