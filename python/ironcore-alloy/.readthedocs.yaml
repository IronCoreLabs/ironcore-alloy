# Read the Docs configuration file for MkDocs projects
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# Docs HTML is pre-built by CI (sdk-ci.yaml / sdk-release.yaml) and uploaded as
# a GitHub Actions artifact keyed by commit SHA. RTD downloads and hosts it.
# See RELEASING.md for required RTD environment variable setup.
version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  commands:
    - |
      REPO="IronCoreLabs/ironcore-alloy"
      COMMIT="$READTHEDOCS_GIT_COMMIT_HASH"
      ARTIFACT_NAME="docs-html-$COMMIT"

      # Find the artifact by commit SHA
      ARTIFACT_URL=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/actions/artifacts?name=$ARTIFACT_NAME" \
        | python3 -c "import sys,json; a=json.load(sys.stdin)['artifacts']; print(a[0]['archive_download_url']) if a else sys.exit(1)")

      # Download and extract to RTD output
      mkdir -p "$READTHEDOCS_OUTPUT/html"
      curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" "$ARTIFACT_URL" -o /tmp/docs.zip
      unzip -o /tmp/docs.zip -d "$READTHEDOCS_OUTPUT/html/"
